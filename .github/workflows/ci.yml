name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build
      - name: Configure
        run: cmake -S core -B core/build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build core/build -j
      - uses: actions/upload-artifact@v4
        with:
          name: stacksd-linux
          path: core/build/stacksd

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S core -B core/build -A x64
      - name: Build
        run: cmake --build core/build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: stacksd-windows
          path: core/build/Release/stacksd.exe

  web-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HTML / CSS / JS syntax sanity
        run: |
          node -e "new Function(require('fs').readFileSync('web/app.js','utf8'))" || echo "(module syntax)"
          python3 -c "import html.parser, pathlib; html.parser.HTMLParser().feed(pathlib.Path('web/index.html').read_text())"
